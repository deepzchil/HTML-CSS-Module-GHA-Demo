name: Inputs Demo
on: 
  workflow_dispatch: 
    inputs:
      environment:
       description: Choose the enviromnet to deploy
       required: true
       default: dev
       options:
         - dev
         - test
         - prod
      artifact_tag:
        description: Chose the git tag to deploy
        required: true
jobs:
  input-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy the App
        run: echo "Deploying the ${{ inputs.artifact_tag }} Application to ${{ inputs.environment }}"
